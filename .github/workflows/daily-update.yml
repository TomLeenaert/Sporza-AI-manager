name: Dagelijkse update

# Draait elke ochtend (en handmatig via de Actions-knop).
on:
  schedule:
    - cron: "30 5 * * *"   # 05:30 UTC ≈ 07:30 Belgische tijd, ruim voor de rit
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node opzetten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --- Verse research door de AI-agent (alleen als de API-key is ingesteld) ---
      - name: Claude CLI installeren
        if: env.HAS_KEY == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Verse research (agents)
        if: env.HAS_KEY == 'true'
        continue-on-error: true      # research mag nooit het publiceren blokkeren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat scripts/daily-research.md)" \
            --allowedTools "WebSearch,Read,Write,Edit" \
            --permission-mode acceptEdits \
            || echo "Research-stap overgeslagen (fout of geen nieuwe info)."

      - name: Ratings herrekenen + bundelen
        run: |
          node scripts/consolidate.mjs
          node scripts/bundle.mjs

      - name: Publiceren indien er iets veranderde
        run: |
          git config user.name "wielermanager-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Geen wijzigingen — niets te publiceren."
          else
            git commit -m "Dagelijkse update ($(date -u +%F))"
            git push
          fi
